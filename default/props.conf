[source::udp:515]
TRANSFORMS-priority = opnsense_extract_priority
TRANSFORMS-route_sourcetype = opnsense_route_services
TRANSFORMS-set_host = opnsense_set_host
LOOKUP-facility = syslog_facility_lookup syslog_facility OUTPUT syslog_facility_text
LOOKUP-severity = syslog_severity_lookup syslog_severity OUTPUT syslog_severity_text
EVAL-syslog_facility = floor(syslog_priority/8)
EVAL-syslog_severity = syslog_priority%8

[opnsense:unbound]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-unbound-reply = opnsense_unbound_reply
REPORT-unbound-query = opnsense_unbound_query
REPORT-unbound-error = opnsense_unbound_error
REPORT-unbound-system = opnsense_unbound_system

[opnsense:openvpn]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-openvpn = opnsense_openvpn_fields

[opnsense:dhcpd]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-dhcpd = opnsense_dhcpd_fields

[opnsense:dhclient]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-dhclient = opnsense_dhclient_fields

[opnsense:configd.py]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-configd = opnsense_configd_fields

[opnsense:configctl]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-configctl = opnsense_configctl_fields

[opnsense:cron]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-cron = opnsense_cron_fields

[opnsense:undefined]
KV_MODE = none
SHOULD_LINEMERGE = false

[opnsense:filterlog]
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-filterlog = opnsense_filterlog_fields

# Preserve vendor fields
EVAL-action_raw = action
EVAL-direction_raw = direction
EVAL-interface_raw = dest_interface
EVAL-transport_num_raw = transport_num
EVAL-transport = case(transport_num=="6" OR transport_num==6 OR lower(trim(transport_raw))=="tcp", "tcp", transport_num=="17" OR transport_num==17 OR lower(trim(transport_raw))=="udp", "udp", transport_num=="1" OR transport_num==1 OR lower(trim(transport_raw))=="icmp", "icmp", transport_num=="58" OR transport_num==58 OR lower(trim(transport_raw))=="icmp6", "icmp6", true(), null())
EVAL-protocol = lower(trim(transport_raw))

# CIM aliases
FIELDALIAS-opnsense-src = src_ip AS src
FIELDALIAS-opnsense-dest = dest_ip AS dest

# Join key for rule lookup
EVAL-join_key = if(isnotnull(tracker) AND tracker!="" AND tracker!="0", tostring(tracker), tostring(rule_number))
LOOKUP-opnsense_rules = opnsense_rules join_key OUTPUTNEW rule_action rule_desc rule_interface

# CIM-ish normalized action (fixed operators + fixed fallthrough)
EVAL-action = case(match(coalesce(lower(trim(rule_action)), lower(trim(action))), "^(pass|rdr|match|accept|allow)$"), "allowed", match(coalesce(lower(trim(rule_action)), lower(trim(action))), "^(block|reject|drop|deny)$"), "blocked", true(), "unknown")

# Internal flags (safe, single-line)
EVAL-src_is_internal = if(cidrmatch("10.0.0.0/8",trim(src_ip)) OR cidrmatch("172.16.0.0/12",trim(src_ip)) OR cidrmatch("192.168.0.0/16",trim(src_ip)),1,0)
EVAL-dest_is_internal = if(cidrmatch("10.0.0.0/8",trim(dest_ip)) OR cidrmatch("172.16.0.0/12",trim(dest_ip)) OR cidrmatch("192.168.0.0/16",trim(dest_ip)),1,0)

# direction_cim computed WITHOUT depending on src_is_internal/dest_is_internal ordering
EVAL-direction_cim = if(cidrmatch("10.0.0.0/8",trim(src_ip)) OR cidrmatch("172.16.0.0/12",trim(src_ip)) OR cidrmatch("192.168.0.0/16",trim(src_ip)), if(cidrmatch("10.0.0.0/8",trim(dest_ip)) OR cidrmatch("172.16.0.0/12",trim(dest_ip)) OR cidrmatch("192.168.0.0/16",trim(dest_ip)),"internal","outbound"), if(cidrmatch("10.0.0.0/8",trim(dest_ip)) OR cidrmatch("172.16.0.0/12",trim(dest_ip)) OR cidrmatch("192.168.0.0/16",trim(dest_ip)),"inbound","external"))

# ES-ready: ensure direction is populated (also ordering-independent)
EVAL-direction = if(cidrmatch("10.0.0.0/8",trim(src_ip)) OR cidrmatch("172.16.0.0/12",trim(src_ip)) OR cidrmatch("192.168.0.0/16",trim(src_ip)), if(cidrmatch("10.0.0.0/8",trim(dest_ip)) OR cidrmatch("172.16.0.0/12",trim(dest_ip)) OR cidrmatch("192.168.0.0/16",trim(dest_ip)),"internal","outbound"), if(cidrmatch("10.0.0.0/8",trim(dest_ip)) OR cidrmatch("172.16.0.0/12",trim(dest_ip)) OR cidrmatch("192.168.0.0/16",trim(dest_ip)),"inbound","external"))