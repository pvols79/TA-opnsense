# --- Priority Extraction ---
[opnsense_extract_priority]
REGEX = ^<(?<syslog_priority>\d+)>
FORMAT = syslog_priority::$1
DEST_KEY = _meta

# --- Sourcetype Routing ---
[opnsense_route_services]
REGEX = \s(filterlog|unbound|dhclient|dhcpd|firewall|openvpn|lighttpd|configctl|configd|cron)
FORMAT = sourcetype::opnsense:$1
DEST_KEY = MetaData:Sourcetype

# --- Host Setting ---
[opnsense_set_host]
REGEX = ^<\d+>\d+\s+\S+\s+(?<syslog_host>[^ ]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

# --- Filterlog Fields ---
[opnsense_filterlog_fields]
REGEX = ^\<\d+\>(?<version>\d+).*.com\s(?<app>[a-z]*)\s\d+.*?\]\s(?<rule_number>\d+),,,(?<tracker>[A-Za-z0-9]+),(?<dest_interface>(?:[A-Za-z0-9]+\.\d+|[A-Za-z0-9]+\d)),[a-z]+,(?<action>[a-z]+),(?<direction>[a-z]+),(?<protocol_version>\d+),(?<tos>[A-Za-z0-9]+),(?<ecn>[A-Za-z0-9]*),(?<ttl>\d+),(?<ipv4_id>\d+),(?<offset>\d+),(?<ip_flag>[A-Za-z]+),(?<transport_num>\d+),(?<transport_raw>[a-z0-9]+),(?<packet_length>\d+),(?<src_ip>\d+\.\d+\.\d+\.\d+),(?<dest_ip>\d+\.\d+\.\d+\.\d+)(?:,(?<src_port>\d+),(?<dest_port>\d+),(?<payload_length>-?\d+)(?:,(?<tcp_flag>[A-Z]+)(?:,(?<sequence_num>[\d:]+))?(?:,(?<ack_number>\d*))?(?:,(?<tcp_window>\d+))?(?:,(?<urg_pointer>\d*))?(?:,(?<tcp_options>.+))?)?|,?datalength=(?<data_length>\d+))(?:\s+[a-z0-9]+)?$
SOURCE_KEY = _raw

# --- Unbound Fields ---
[opnsense_unbound_reply]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+(?<app>[a-z]+).*]\s(?<type>[a-z]+):\s(?<client_ip>\d+.\d+.\d+.\d+)\s(?<query>\S+)\s(?<record>\S+)\s(?<class>\S+)\s(?<response_code>\S+)\s(?<duration>\S+)\s(?<meta>\S+)\s(?<byte>\S+)
SOURCE_KEY = _raw

[opnsense_unbound_query]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+(?<app>[a-z]+).*]\s(?<type>[a-z]+):\s(?<client_ip>\d+.\d+.\d+.\d+)\s(?<query>\S+)\s(?<record>\S+)\s(?<class>\S+)
SOURCE_KEY = _raw

[opnsense_unbound_error]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+(?<app>[a-z]+).*]\s(?<type>error):(?<message>.*)
SOURCE_KEY = _raw

[opnsense_unbound_system]
REGEX = ^<165>.*com\s(?<app>[a-z]+)\s.*]\s(?<message>.*)
SOURCE_KEY = _raw

# --- OpenVPN Fields ---
[opnsense_openvpn_fields]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+\S+\s+openvpn[^ ]*\s+\d+\s+-\s+(?<message>.+)
SOURCE_KEY = _raw

# --- DHCPD Fields ---
[opnsense_dhcpd_fields]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+\S+\s+dhcpd\s+\d+\s+-\s+(?<log>.+)
SOURCE_KEY = _raw

# --- DHCLIENT Fields ---
[opnsense_dhclient_fields]
REGEX = .+com\s(?<app>[a-z]+)\s\d+\s-\s\[.*\](?<message>.*)
SOURCE_KEY = _raw

# --- Configd.py Fields ---
[opnsense_configd_fields]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+\S+\s+configd\.py\s+\d+\s+-\s+(?<message>.+)
SOURCE_KEY = _raw

# --- Configctl Fields ---
[opnsense_configctl_fields]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+\S+\s+configctl\s+\d+\s+-\s+(?<message>.+)
SOURCE_KEY = _raw

# --- Cron Fields ---
[opnsense_cron_fields]
REGEX = ^<\d+>\d+\s+\S+\s+\S+\s+\S+\s+[^ ]*cron[^ ]*\s+\d+\s+-\s+(?<message>.+)
SOURCE_KEY = _raw

# --- Lookups ---
[syslog_facility_lookup]
filename = syslog_facility_lookup.csv

[syslog_severity_lookup]
filename = syslog_severity_lookup.csv

[opnsense_rules]
filename = opnsense_rules.csv
case_sensitive_match = false

[opnsense_interfaces]
filename = opnsense_interfaces.csv
case_sensitive_match = false
